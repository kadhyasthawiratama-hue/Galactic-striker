<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galactic Overlord v1.8.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-orange: #ffaa00;
            --neon-red: #ff0044;
            --neon-green: #33ff00;
            --neon-purple: #bc00ff;
            --bg-dark: #010105;
        }

        body { 
            margin: 0; background: var(--bg-dark); overflow: hidden; 
            font-family: 'Rajdhani', sans-serif; 
            touch-action: none; color: white;
            display: flex; justify-content: center;
        }

        canvas { display: block; background: #000; touch-action: none; }

        #hud { position: absolute; inset: 0; pointer-events: none; padding: 20px; display: none; z-index: 10; }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .stat-box { background: rgba(0, 242, 255, 0.05); border-left: 3px solid var(--neon-cyan); padding: 5px 12px; backdrop-filter: blur(10px); }
        .label { font-size: 10px; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; }
        .value { font-size: 20px; font-weight: 700; color: #fff; }

        .bar-outer { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 4px; overflow: hidden; }
        #health-fill { height: 100%; background: var(--neon-cyan); width: 100%; transition: width 0.3s; box-shadow: 0 0 10px var(--neon-cyan); }
        .regen-active { animation: regenGlow 1s infinite; }
        @keyframes regenGlow { 50% { background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); } }

        #log-panel { position: absolute; top: 100px; left: 20px; width: 220px; font-size: 11px; color: #00f2ff; opacity: 0.8; pointer-events: none; text-transform: uppercase; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .menu-card { background: #000; border: 1px solid var(--neon-cyan); padding: 30px; border-radius: 15px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); width: 85%; max-width: 380px; text-align: center; }
        .title { font-family: 'Black Ops One', cursive; font-size: 32px; color: #fff; margin: 0; }
        .btn-play { background: var(--neon-cyan); color: #000; border: none; padding: 12px 30px; font-size: 18px; font-weight: 700; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px; }

        #boss-hud { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 280px; text-align: center; display: none; }
        #boss-hp-fill { height: 6px; background: var(--neon-red); width: 100%; box-shadow: 0 0 15px var(--neon-red); }

        .upgrade-btn { background: #111; border: 1px solid #333; color: #fff; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.2s; }
        .upgrade-btn:hover { border-color: var(--neon-cyan); background: rgba(0, 242, 255, 0.1); }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-top">
            <div class="stat-box">
                <span class="label">LEVEL</span>
                <div id="lv-val" class="value">01</div>
            </div>
            <div class="stat-box" style="width: 150px;">
                <span class="label" id="hull-status">HULL STATUS</span>
                <div class="bar-outer"><div id="health-fill"></div></div>
            </div>
        </div>
        <div id="log-panel"></div>
        <div id="boss-hud">
            <span id="boss-name" class="label" style="color:var(--neon-red); font-weight: bold;">UNKNOWN ENTITY</span>
            <div class="bar-outer" style="border: 1px solid var(--neon-red); background: #200;"><div id="boss-hp-fill"></div></div>
        </div>
    </div>

    <div id="screen-start" class="overlay">
        <div class="menu-card">
            <h1 class="title" style="color: var(--neon-cyan);">GALACTIC</h1>
            <h1 class="title">OVERLORD</h1>
            <p style="font-size: 12px; color: #555;">v1.8.5 - SUPREME RESTORATION</p>
            <div style="text-align: left; font-size: 13px; color: #aaa; margin: 15px 0;">
                • Boss Skills Evolution (Level Locked)<br>
                • Minion Rework: Interceptors & Scouts<br>
                • Fixed Navigation Lag & Initial Stuck<br>
                • 9 Unique Attack Tier Patterns
            </div>
            <button class="btn-play" onclick="initGame()">DEPLOY MECHA</button>
        </div>
    </div>

    <div id="screen-upgrade" class="overlay" style="display:none;">
        <div class="menu-card" style="border-color: var(--neon-orange);">
            <h2 style="color: var(--neon-orange); margin: 0;">UPGRADE AVAILABLE</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">CHOOSE YOUR EVOLUTION</p>
            <div id="upgrade-choices" style="display: flex; flex-direction: column;"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let cw, ch;

function resize() {
    cw = canvas.width = Math.min(window.innerWidth, 500);
    ch = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Game State
let playing = false;
let score = 0, level = 1, frame = 0;
let mouseX = 0, mouseY = 0;

const p = {
    x: 0, y: 0, w: 46, h: 50, hp: 100, maxHp: 100,
    fr: 250, lastF: 0, dmg: 20, tilt: 0,
    regen: 0.05, lastHit: 0
};

let stars = Array.from({length: 80}, () => ({x: Math.random()*500, y: Math.random()*ch, s: Math.random()*2, sp: Math.random()*4+1}));
let bullets = [], enemies = [], enemyBullets = [], vfx = [], activeBoss = null;

// --- ASSET DRAWING (RESORED FROM v1.8.0) ---

function drawPlayer() {
    ctx.save();
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.tilt * 0.4);
    let isRegen = (frame - p.lastHit > 120 && p.hp < p.maxHp);
    ctx.shadowBlur = isRegen ? 20 : 15;
    ctx.shadowColor = isRegen ? "#33ff00" : "#00f2ff";
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.moveTo(0, -p.h/2); ctx.lineTo(-p.w/2, p.h/2); ctx.lineTo(0, p.h/3); ctx.lineTo(p.w/2, p.h/2); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = isRegen ? "#33ff00" : "#00f2ff";
    ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = (frame % 4 < 2) ? "#ffaa00" : "#fff";
    ctx.fillRect(-p.w/4, p.h/2-2, 6, 12 + Math.random()*8);
    ctx.fillRect(p.w/4-6, p.h/2-2, 6, 12 + Math.random()*8);
    ctx.restore();
}

function drawMinion(e) {
    ctx.save(); ctx.translate(e.x + e.w/2, e.y + e.h/2);
    ctx.shadowBlur = 10; ctx.shadowColor = e.color; ctx.fillStyle = e.color;
    if (e.type === 'scout') { ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(15, 15); ctx.lineTo(-15, 15); ctx.closePath(); ctx.fill(); }
    else if (e.type === 'heavy') { ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(15, 0); ctx.lineTo(0, 20); ctx.lineTo(-15, 0); ctx.closePath(); ctx.fill(); }
    else { ctx.rotate(frame * 0.1); for(let i=0; i<4; i++) { ctx.rotate(Math.PI/2); ctx.fillRect(-5, -15, 10, 30); } }
    ctx.restore();
}

function drawBoss(b) {
    ctx.save(); ctx.translate(b.x + b.w/2, b.y + b.h/2);
    ctx.shadowBlur = 25; ctx.shadowColor = b.color;
    if (b.type === 'skull') {
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, -10, 45, Math.PI, 0); ctx.lineTo(40, 35); ctx.lineTo(-40, 35); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(-18, 5, 10, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(18, 5, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(-18, 5, 4 + Math.sin(frame*0.1)*2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(18, 5, 4 + Math.sin(frame*0.1)*2, 0, Math.PI*2); ctx.fill();
    } else if (b.type === 'fortress') {
        ctx.fillStyle = "#222"; ctx.fillRect(-55, -45, 110, 90); ctx.strokeStyle = b.color; ctx.lineWidth = 3; ctx.strokeRect(-55, -45, 110, 90);
        ctx.fillStyle = b.color; ctx.fillRect(-25, -5, 50, 10); ctx.fillRect(-10, -30, 20, 60);
    } else {
        ctx.rotate(frame * 0.03); ctx.fillStyle = "#111"; ctx.beginPath(); ctx.moveTo(0, -60); ctx.lineTo(50, 0); ctx.lineTo(0, 60); ctx.lineTo(-50, 0); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = b.color; ctx.lineWidth = 4; ctx.stroke(); ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(0, 0, 20 + Math.sin(frame*0.1)*8, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawBullet(eb) {
    ctx.save(); ctx.translate(eb.x, eb.y); ctx.rotate(eb.rot || 0); ctx.fillStyle = eb.c; ctx.shadowBlur = 8; ctx.shadowColor = eb.c;
    if (eb.shape === 'crescent') { ctx.beginPath(); ctx.arc(0, 0, eb.s, 0, Math.PI); ctx.closePath(); ctx.fill(); }
    else if (eb.shape === 'arrow') { ctx.beginPath(); ctx.moveTo(0, -eb.s); ctx.lineTo(eb.s/2, eb.s); ctx.lineTo(0, eb.s/2); ctx.lineTo(-eb.s/2, eb.s); ctx.closePath(); ctx.fill(); }
    else if (eb.shape === 'cross') { ctx.fillRect(-eb.s/2, -eb.s/6, eb.s, eb.s/3); ctx.fillRect(-eb.s/6, -eb.s/2, eb.s/3, eb.s); }
    else if (eb.shape === 'beam') { ctx.fillRect(-eb.s/4, -eb.s*2, eb.s/2, eb.s*4); }
    else { ctx.beginPath(); ctx.arc(0, 0, eb.s/2, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
}

// --- SKILL SYSTEM (RESTORED) ---
const bossSkills = {
    crescentRain: (b) => { if(frame % 15 === 0) spawnEBullet(b.x + Math.random()*b.w, b.y+b.h, 0, 5, 16, "#ff0044", 'crescent', Math.PI); },
    basicFan: (b) => { if(frame % 60 === 0) { for(let i=-2; i<=2; i++) { let a = Math.PI/2 + (i*0.3); spawnEBullet(b.x+b.w/2, b.y+b.h/2, Math.cos(a)*6, Math.sin(a)*6, 12, "#00f2ff", 'arrow', a+Math.PI/2); } } },
    voidSpiral: (b) => { if(frame % 8 === 0) { let a = frame * 0.2; spawnEBullet(b.x+b.w/2, b.y+b.h/2, Math.cos(a)*6, Math.sin(a)*6, 15, "#ffaa00", 'cross', a); } },
    mirrorBeams: (b) => { if(frame % 100 === 0) { spawnEBullet(b.x, b.y+b.h, -3, 4, 25, "#bc00ff", 'beam', 0.5); spawnEBullet(b.x+b.w, b.y+b.h, 3, 4, 25, "#bc00ff", 'beam', -0.5); } },
    dimensionCleaver: (b) => { if(frame % 40 === 0) { for(let i=0; i<12; i++) { let a = (i/12)*Math.PI*2 + (frame*0.05); spawnEBullet(b.x+b.w/2, b.y+b.h/2, Math.cos(a)*4, Math.sin(a)*4, 10, "#fff", 'circle'); } } }
};

function getSkillsForLevel(lvl) {
    if (lvl <= 2) return ['crescentRain', 'basicFan'];
    if (lvl <= 5) return ['voidSpiral', 'mirrorBeams', 'crescentRain'];
    return ['dimensionCleaver', 'voidSpiral', 'mirrorBeams'];
}

function spawnEBullet(x, y, vx, vy, s, c, shape='circle', rot=0) { enemyBullets.push({x, y, vx, vy, s, c, shape, rot}); }

function spawnBoss() {
    const types = ['skull', 'fortress', 'totem'];
    const type = types[(level-1) % 3];
    const pool = getSkillsForLevel(level);
    activeBoss = { name: type.toUpperCase()+" MK-"+level, type: type, hp: 1500+(level*700), curHp: 1500+(level*700), w: 100, h: 100, x: cw/2-50, y: -200, dir: 1, sp: 1.5+(level*0.4), color: "#ff0044", skillPool: pool, currentPattern: pool[0], lastPatternChange: frame };
    document.getElementById("boss-hud").style.display = "block";
    document.getElementById("boss-name").innerText = activeBoss.name;
    addLog("BOSS DETECTED!");
}

function addLog(msg) {
    const panel = document.getElementById("log-panel");
    const d = document.createElement("div"); d.innerText = `> ${msg}`; panel.prepend(d);
    if(panel.children.length > 5) panel.removeChild(panel.lastChild);
}

// --- CORE ENGINE ---

function initGame() {
    p.x = cw/2 - p.w/2; p.y = ch - 120;
    // Fix: Sinkronkan input ke posisi awal
    mouseX = p.x + p.w/2; mouseY = p.y + p.h/2;
    p.hp = p.maxHp; p.lastHit = 0; playing = true;
    document.getElementById("screen-start").style.display = "none";
    document.getElementById("hud").style.display = "block";
    addLog("DEPLOYING UNIT...");
    requestAnimationFrame(loop);
}

function loop() {
    if(!playing) return;
    frame++;
    stars.forEach(s => { s.y += s.sp; if(s.y > ch) s.y = -10; });

    // Regen Logic (RESTORED)
    if (frame - p.lastHit > 120 && p.hp < p.maxHp) {
        p.hp += p.regen;
        document.getElementById("health-fill").classList.add("regen-active");
        document.getElementById("hull-status").innerText = "REPAIRING...";
        document.getElementById("hull-status").style.color = "#33ff00";
    } else {
        document.getElementById("health-fill").classList.remove("regen-active");
        document.getElementById("hull-status").innerText = "HULL STATUS";
        document.getElementById("hull-status").style.color = "#00f2ff";
    }

    // Navigasi (FIXED)
    let oldX = p.x;
    p.x += (mouseX - p.w/2 - p.x) * 0.18;
    p.y += (mouseY - p.h/2 - p.y) * 0.18;
    p.tilt = (p.x - oldX) * 0.12;

    if(Date.now() - p.lastF > p.fr) { bullets.push({x: p.x+p.w/2, y: p.y, vy: -15}); p.lastF = Date.now(); }

    // Bullet Logic
    bullets = bullets.filter(b => {
        b.y -= 15;
        if(activeBoss && b.x > activeBoss.x && b.x < activeBoss.x+activeBoss.w && b.y > activeBoss.y && b.y < activeBoss.y+activeBoss.h) {
            activeBoss.curHp -= p.dmg;
            if(activeBoss.curHp <= 0) { activeBoss = null; document.getElementById("boss-hud").style.display = "none"; showUpgrade(); }
            return false;
        }
        return b.y > -50;
    });

    enemyBullets = enemyBullets.filter(eb => {
        eb.x += eb.vx; eb.y += eb.vy;
        if(eb.x > p.x && eb.x < p.x+p.w && eb.y > p.y && eb.y < p.y+p.h) {
            p.hp -= 12; p.lastHit = frame; spawnVFX(p.x+p.w/2, p.y+p.h/2, 10, "#ff0044");
            if(p.hp <= 0) location.reload(); return false;
        }
        return eb.y < ch + 50 && eb.x > -50 && eb.x < cw + 50;
    });

    // Enemy Spawning (RESTORED)
    if(!activeBoss && frame % 100 === 0) {
        let r = Math.random();
        let type = r > 0.7 ? 'mine' : (r > 0.3 ? 'heavy' : 'scout');
        let col = type === 'mine' ? '#ffaa00' : (type === 'heavy' ? '#bc00ff' : '#ff0044');
        enemies.push({x: Math.random()*(cw-40), y:-50, w:30, h:30, hp: 30+(level*10), type, color: col});
    }

    enemies = enemies.filter(e => {
        e.y += e.type === 'scout' ? 5 : 3;
        if(frame % 70 === 0) spawnEBullet(e.x+e.w/2, e.y+e.h, 0, 5, 8, e.color, 'arrow', Math.PI);
        let alive = true;
        bullets.forEach((b, bi) => {
            if(alive && b.x > e.x && b.x < e.x+e.w && b.y > e.y && b.y < e.y+e.h) {
                e.hp -= p.dmg; bullets.splice(bi, 1);
                if(e.hp <= 0) { spawnVFX(e.x+e.w/2, e.y+e.h/2, 10, e.color); score += 150; if(score % 3000 === 0) spawnBoss(); alive = false; }
            }
        });
        return alive && e.y < ch + 50;
    });

    if(activeBoss) {
        if(activeBoss.y < 120) activeBoss.y += 2.5;
        activeBoss.x += activeBoss.sp * activeBoss.dir;
        if(activeBoss.x < 20 || activeBoss.x > cw-activeBoss.w-20) activeBoss.dir *= -1;
        if(frame - activeBoss.lastPatternChange > 180) {
            activeBoss.currentPattern = activeBoss.skillPool[Math.floor(Math.random()*activeBoss.skillPool.length)];
            activeBoss.lastPatternChange = frame;
            addLog("BOSS ADAPTING...");
        }
        bossSkills[activeBoss.currentPattern](activeBoss);
        document.getElementById("boss-hp-fill").style.width = (activeBoss.curHp/activeBoss.hp)*100+"%";
    }

    vfx = vfx.filter(v => { v.x += v.vx; v.y += v.vy; v.l -= 0.02; return v.l > 0; });

    draw(); updateUI(); requestAnimationFrame(loop);
}

function draw() {
    ctx.clearRect(0,0,cw,ch);
    stars.forEach(s => { ctx.fillStyle="#fff"; ctx.fillRect(s.x, s.y, s.s, s.s); });
    drawPlayer();
    enemies.forEach(drawMinion);
    if(activeBoss) drawBoss(activeBoss);
    ctx.fillStyle = "#00f2ff"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 15));
    enemyBullets.forEach(drawBullet);
    vfx.forEach(v => { ctx.globalAlpha = v.l; ctx.fillStyle = v.c; ctx.fillRect(v.x, v.y, 3, 3); });
    ctx.globalAlpha = 1;
}

function updateUI() {
    document.getElementById("health-fill").style.width = (p.hp/p.maxHp)*100 + "%";
    document.getElementById("lv-val").innerText = level.toString().padStart(2, '0');
}

function spawnVFX(x, y, count, col) {
    for(let i=0; i<count; i++) vfx.push({x, y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12, l:1, c:col});
}

function showUpgrade() {
    playing = false; p.hp = p.maxHp;
    addLog("VICTORY! SYSTEMS STABLE.");
    const upg = [
        {n: "QUANTUM REGEN", d: "Regeneration +100%", action: () => p.regen *= 2},
        {n: "VOID CANNON", d: "Damage & Speed UP", action: () => { p.dmg += 15; p.fr *= 0.85; }},
        {n: "DREADNOUGHT", d: "Max HP +150", action: () => { p.maxHp += 150; p.hp = p.maxHp; }}
    ];
    const container = document.getElementById("upgrade-choices");
    container.innerHTML = "";
    upg.forEach(u => {
        const btn = document.createElement("div");
        btn.className = "upgrade-btn";
        btn.innerHTML = `<strong>${u.n}</strong><br><small style='color:#888'>${u.d}</small>`;
        btn.onclick = () => {
            u.action(); level++; addLog("RANK UP: LEVEL " + level);
            document.getElementById("screen-upgrade").style.display = "none";
            playing = true; requestAnimationFrame(loop);
        };
        container.appendChild(btn);
    });
    document.getElementById("screen-upgrade").style.display = "flex";
}

// FIX INPUT HANDLER
const updateInput = (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX || (e.touches && e.touches[0].clientX);
    const cy = e.clientY || (e.touches && e.touches[0].clientY);
    if(cx !== undefined) {
        mouseX = cx - rect.left;
        mouseY = cy - rect.top;
    }
};
canvas.addEventListener("pointermove", updateInput);
canvas.addEventListener("touchmove", updateInput, {passive: false});
canvas.addEventListener("touchstart", updateInput, {passive: false});
</script>
</body>
</html>
